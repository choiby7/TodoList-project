events {
    worker_connections 1024;
}

http {
    # 기본 설정
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 로그 설정
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 성능 최적화
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Upstream 서버 정의
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ================================
    # HTTP 서버: HTTPS로 강제 리다이렉트
    # ================================
    server {
        listen 80;
        server_name cbytodolist.duckdns.org;

        # Let's Encrypt ACME 챌린지용 (인증서 갱신 시 필요)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 모든 HTTP 요청을 HTTPS로 301 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================================
    # HTTPS 서버: 실제 서비스
    # ================================
    server {
        listen 443 ssl http2;
        server_name cbytodolist.duckdns.org;

        # ===========================
        # SSL 인증서 설정
        # ===========================
        ssl_certificate /etc/letsencrypt/live/cbytodolist.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cbytodolist.duckdns.org/privkey.pem;

        # SSL 프로토콜 및 암호화 설정 (보안 강화)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL 세션 캐싱 (성능 최적화)
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ===========================
        # 보안 헤더 (HTTPS 전용)
        # ===========================
        # HSTS: 향후 1년간 HTTPS 강제 (하위 도메인 포함)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # XSS 방지
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer 정책
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 클라이언트 요청 크기 제한
        client_max_body_size 10M;

        # ===========================
        # 기존 프록시 규칙
        # ===========================

        # Backend API 프록시
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 지원
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # OAuth2 Authorization (Google 로그인 시작)
        location /oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # OAuth2 Callback (Google 로그인 후 리다이렉트)
        location /login/oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Actuator Health Check
        location /actuator/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 헬스체크 로그 비활성화 (성능)
            access_log off;
        }

        # Next.js Static Assets (캐싱)
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 캐싱 설정
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Favicon & Robots
        location ~* \.(ico|txt)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;

            # 캐싱 설정
            expires 7d;
            add_header Cache-Control "public";
        }

        # Frontend (모든 나머지 요청)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 지원 (Next.js Hot Reload)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Next.js Hot Reload 지원
            proxy_buffering off;
        }
    }
}
