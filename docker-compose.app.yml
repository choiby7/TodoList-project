# ================================
# 앱 서버 - nginx, frontend, backend, redis
# ================================
# 실행 순서: 2. DB 서버 실행 후 앱 서버 시작
# 명령어: docker-compose -f docker-compose.app.yml up -d
# 또는: make up

version: '3.8'

services:
  # ================================
  # Nginx (Reverse Proxy)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: todolist-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - todolist-network

  # ================================
  # Frontend (Next.js)
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""  # 빈 문자열 (API 코드에서 이미 /api 경로 포함)
    container_name: todolist-frontend
    env_file:
      - .env.app
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - todolist-network

  # ================================
  # Backend (Spring Boot)
  # ================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: todolist-backend
    env_file:
      - .env.app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/todolist_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      # Flyway 설정 (FlywayConfig.java에서 수동 Bean 등록, AutoConfiguration 비활성화)
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_FLYWAY_LOCATIONS=classpath:db/migration
      - SPRING_FLYWAY_SCHEMAS=todolist_db
      - SPRING_FLYWAY_DEFAULT_SCHEMA=todolist_db
      - SPRING_FLYWAY_CREATE_SCHEMAS=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_BASELINE_VERSION=0
      # Flyway & AutoConfiguration 디버그 로깅
      - LOGGING_LEVEL_ORG_FLYWAYDB=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_AUTOCONFIGURE=DEBUG
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_VALIDITY=${JWT_ACCESS_EXPIRATION}
      - JWT_REFRESH_TOKEN_VALIDITY=${JWT_REFRESH_EXPIRATION}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      # Reverse Proxy 헤더 신뢰 설정 (X-Forwarded-* 헤더로 HTTPS 인식)
      - SERVER_FORWARD_HEADERS_STRATEGY=native
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - todolist-network

  # ================================
  # Redis Cache
  # ================================
  redis:
    image: redis:7-alpine
    container_name: todolist-redis
    env_file:
      - .env.app
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - todolist-network

# ================================
# Named Volumes
# ================================
volumes:
  redis_data:
    driver: local

# ================================
# Networks (앱 서버 자체 생성)
# ================================
# 프로덕션: DB 서버와 앱 서버가 물리적으로 다른 머신
# DB 연결은 SPRING_DATASOURCE_URL의 IP로 하므로 네트워크 공유 불필요
networks:
  todolist-network:
    driver: bridge
    name: todolist-network
